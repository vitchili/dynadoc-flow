apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-shared-infrastructure
  namespace: shared-infrastructure
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: user-service
        - namespaceSelector:
            matchLabels:
              name: template-service
        - namespaceSelector:
            matchLabels:
              name: file-service
        - namespaceSelector:
            matchLabels:
              name: dynadoc-system
