apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
  namespace: user-service
type: Opaque
data:
  db-password: cm9vdA== # root
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: user-service
data:
  APP_NAME: "User Service"
  APP_ENV: "production"
  APP_KEY: "base64:your-app-key-here"
  APP_DEBUG: "false"
  APP_URL: "http://user-service"

  LOG_CHANNEL: "stack"
  LOG_DEPRECATIONS_CHANNEL: "null"
  LOG_LEVEL: "debug"

  DB_CONNECTION: "mysql"
  DB_HOST: "mysql-service.shared-infrastructure.svc.cluster.local"
  DB_PORT: "3306"
  DB_DATABASE: "user_service"
  DB_USERNAME: "root"

  REDIS_HOST: "redis-service.shared-infrastructure.svc.cluster.local"
  REDIS_PASSWORD: "null"
  REDIS_PORT: "6379"

  KAFKA_BROKERS: "kafka-service.shared-infrastructure.svc.cluster.local:9092"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-service-storage
  namespace: user-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: user-service
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-service:latest
          ports:
            - containerPort: 9000
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: db-password
          envFrom:
            - configMapRef:
                name: user-service-config
          volumeMounts:
            - name: user-service-storage
              mountPath: /var/www/user
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - php-fpm
                - -t
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - php-fpm
                - -t
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: user-service-storage
          persistentVolumeClaim:
            claimName: user-service-storage
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: user-service
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 9000
      targetPort: 9000
      name: php-fpm
  type: ClusterIP
